@if (results().length === 0) {
<div class="no-results">
    Няма намерени снимки.
</div>
}
@else {
<div class="grid">
    @for (result of results(); track result.url) {
    <div class="card">
        <img [src]="getImageUrl(result.url)"
             [alt]="result.name" />
        <div class="card-info">
            <span class="image-name">{{ result.name }}</span>
            <span class="score">{{ result.score | number:'1.2-2' }}</span>
        </div>
    </div>
    }
</div>
}
