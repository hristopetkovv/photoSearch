<div class="search-container">

    <h1>Търсене на снимки</h1>

    <!-- status -->
    @if (status()) {
    <div class="status">
        <span [class.ready]="status()?.ready"
              [class.not-ready]="!status()?.ready">
            {{ status()?.ready ? '● ' + status()?.indexed + ' снимки индексирани' : '● Индексиране...' }}
        </span>
    </div>
    }

    <div class="search-box">

        <!-- searchText -->
        <input type="text"
               [ngModel]="searchText()"
               (ngModelChange)="searchText.set($event)"
               (keydown)="onKeyDown($event)"
               placeholder="Търси снимки... (напр. куче, плаж, залез)" />
        <button (click)="search()"
                [disabled]="loading() || !searchText().trim()">
            {{ loading() ? 'Търси...' : 'Търси' }}
        </button>

        <app-upload-image (uploaded)="checkStatus()" />

    </div>

    <!-- loading -->
    @if (loading()) {
    <div class="loading">
        Обработка на заявката...
    </div>
    }

    <!-- searched и results -->
    @if (searched() && !loading()) {
    <app-image-grid [results]="results()">
    </app-image-grid>
    }

</div>
